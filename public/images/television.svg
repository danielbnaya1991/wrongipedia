<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- TV body -->
  <rect x="90" y="40" width="100" height="72" rx="4" fill="#37474f" stroke="#263238" stroke-width="2"/>
  <!-- Screen -->
  <rect x="97" y="47" width="86" height="55" rx="2" fill="#b3e5fc" stroke="#455a64" stroke-width="1"/>
  <!-- Screen glare -->
  <rect x="100" y="50" width="25" height="3" rx="1" fill="white" opacity="0.3"/>
  <!-- Antenna -->
  <line x1="120" y1="40" x2="105" y2="22" stroke="#546e7a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="40" x2="175" y2="22" stroke="#546e7a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="105" cy="22" r="2.5" fill="#546e7a"/>
  <circle cx="175" cy="22" r="2.5" fill="#546e7a"/>
  <!-- Stand -->
  <rect x="130" y="112" width="20" height="8" rx="2" fill="#455a64" stroke="#263238" stroke-width="1"/>
  <!-- Base -->
  <rect x="115" y="118" width="50" height="5" rx="2" fill="#455a64" stroke="#263238" stroke-width="1"/>
  <!-- Screen content - simple test pattern -->
  <rect x="100" y="65" width="18" height="12" fill="#ef5350" opacity="0.5"/>
  <rect x="121" y="65" width="18" height="12" fill="#66bb6a" opacity="0.5"/>
  <rect x="142" y="65" width="18" height="12" fill="#42a5f5" opacity="0.5"/>
  <rect x="163" y="65" width="17" height="12" fill="#fdd835" opacity="0.5"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Television</text>
</svg>