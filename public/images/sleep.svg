<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Face circle -->
  <circle cx="135" cy="78" r="35" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <!-- Closed eyes (arcs) -->
  <path d="M115,72 C118,68 125,68 128,72" fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>
  <path d="M142,72 C145,68 152,68 155,72" fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round"/>
  <!-- Sleeping mouth (small o) -->
  <ellipse cx="135" cy="92" rx="5" ry="6" fill="#e8b830" stroke="#5d4037" stroke-width="1.5"/>
  <!-- Blush -->
  <ellipse cx="112" cy="82" rx="6" ry="3" fill="#ffcc80" opacity="0.6"/>
  <ellipse cx="158" cy="82" rx="6" ry="3" fill="#ffcc80" opacity="0.6"/>
  <!-- Z letters -->
  <text x="175" y="58" font-family="Georgia, serif" font-size="18" fill="#5c6bc0" font-weight="bold" opacity="0.8">Z</text>
  <text x="190" y="42" font-family="Georgia, serif" font-size="14" fill="#5c6bc0" font-weight="bold" opacity="0.6">Z</text>
  <text x="200" y="30" font-family="Georgia, serif" font-size="11" fill="#5c6bc0" font-weight="bold" opacity="0.4">Z</text>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Sleep</text>
</svg>