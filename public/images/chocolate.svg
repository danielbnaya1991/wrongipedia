<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Chocolate bar wrapper (partially opened) -->
  <rect x="92" y="42" width="96" height="72" rx="3" fill="#795548" stroke="#5d4037" stroke-width="2"/>
  <!-- Wrapper fold -->
  <polygon points="92,42 80,30 80,80 92,72" fill="#ffab00" stroke="#ff8f00" stroke-width="1"/>
  <polygon points="92,42 80,30 140,30 140,42" fill="#ffc107" stroke="#ff8f00" stroke-width="1"/>
  <!-- Chocolate squares -->
  <line x1="116" y1="42" x2="116" y2="114" stroke="#5d4037" stroke-width="1.5"/>
  <line x1="140" y1="42" x2="140" y2="114" stroke="#5d4037" stroke-width="1.5"/>
  <line x1="164" y1="42" x2="164" y2="114" stroke="#5d4037" stroke-width="1.5"/>
  <line x1="92" y1="60" x2="188" y2="60" stroke="#5d4037" stroke-width="1.5"/>
  <line x1="92" y1="78" x2="188" y2="78" stroke="#5d4037" stroke-width="1.5"/>
  <line x1="92" y1="96" x2="188" y2="96" stroke="#5d4037" stroke-width="1.5"/>
  <!-- Highlights on squares -->
  <rect x="95" y="45" width="6" height="3" rx="1" fill="#8d6e63" opacity="0.5"/>
  <rect x="119" y="63" width="6" height="3" rx="1" fill="#8d6e63" opacity="0.5"/>
  <rect x="143" y="81" width="6" height="3" rx="1" fill="#8d6e63" opacity="0.5"/>
  <rect x="167" y="45" width="6" height="3" rx="1" fill="#8d6e63" opacity="0.5"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Chocolate</text>
</svg>