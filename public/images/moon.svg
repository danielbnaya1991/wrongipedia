  <circle cx="140" cy="80" r="32" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <!-- Craters -->
  <circle cx="128" cy="70" r="6" fill="#bdbdbd" opacity="0.5"/>
  <circle cx="150" cy="85" r="8" fill="#bdbdbd" opacity="0.4"/>
  <circle cx="135" cy="95" r="4" fill="#bdbdbd" opacity="0.5"/>
  <circle cx="155" cy="68" r="5" fill="#bdbdbd" opacity="0.35"/>
