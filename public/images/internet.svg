<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Globe circle -->
  <circle cx="140" cy="78" r="35" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <!-- Vertical meridian -->
  <ellipse cx="140" cy="78" rx="15" ry="35" fill="none" stroke="#1565c0" stroke-width="1"/>
  <!-- Horizontal equator -->
  <line x1="105" y1="78" x2="175" y2="78" stroke="#1565c0" stroke-width="1"/>
  <!-- Latitude lines -->
  <ellipse cx="140" cy="60" rx="30" ry="6" fill="none" stroke="#1565c0" stroke-width="0.7"/>
  <ellipse cx="140" cy="96" rx="30" ry="6" fill="none" stroke="#1565c0" stroke-width="0.7"/>
  <!-- Connection nodes -->
  <circle cx="105" cy="55" r="3" fill="#1565c0"/>
  <circle cx="175" cy="55" r="3" fill="#1565c0"/>
  <circle cx="105" cy="100" r="3" fill="#1565c0"/>
  <circle cx="175" cy="100" r="3" fill="#1565c0"/>
  <!-- Connection lines -->
  <line x1="105" y1="55" x2="118" y2="63" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="175" y1="55" x2="162" y2="63" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="105" y1="100" x2="118" y2="93" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="175" y1="100" x2="162" y2="93" stroke="#1565c0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">The Internet</text>
</svg>