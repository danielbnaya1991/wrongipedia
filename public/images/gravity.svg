<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Tree branch -->
  <line x1="120" y1="30" x2="160" y2="30" stroke="#795548" stroke-width="4" stroke-linecap="round"/>
  <line x1="155" y1="30" x2="145" y2="42" stroke="#795548" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Apple -->
  <circle cx="145" cy="55" r="10" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <line x1="145" y1="45" x2="145" y2="42" stroke="#795548" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="148" cy="46" rx="3" ry="2" fill="#4caf50"/>
  <!-- Motion lines -->
  <line x1="135" y1="72" x2="135" y2="85" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="145" y1="72" x2="145" y2="90" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="155" y1="72" x2="155" y2="85" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Arrow down -->
  <polygon points="140,105 145,95 150,105" fill="#9e9e9e"/>
  <!-- Ground -->
  <line x1="110" y1="115" x2="180" y2="115" stroke="#9e9e9e" stroke-width="1.5"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Gravity</text>
</svg>