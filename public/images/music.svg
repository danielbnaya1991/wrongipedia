<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Staff lines -->
  <line x1="70" y1="50" x2="210" y2="50" stroke="#bdbdbd" stroke-width="0.8"/>
  <line x1="70" y1="60" x2="210" y2="60" stroke="#bdbdbd" stroke-width="0.8"/>
  <line x1="70" y1="70" x2="210" y2="70" stroke="#bdbdbd" stroke-width="0.8"/>
  <line x1="70" y1="80" x2="210" y2="80" stroke="#bdbdbd" stroke-width="0.8"/>
  <line x1="70" y1="90" x2="210" y2="90" stroke="#bdbdbd" stroke-width="0.8"/>
  <!-- Treble clef (simplified) -->
  <path d="M85,88 C85,88 78,78 78,68 C78,55 85,48 90,48 C95,48 98,55 95,62 C92,70 82,75 82,85 C82,95 90,100 95,95 M90,48 C90,48 92,40 90,32" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Notes -->
  <!-- Quarter note -->
  <ellipse cx="120" cy="75" rx="6" ry="4.5" fill="#333" transform="rotate(-15,120,75)"/>
  <line x1="125.5" y1="73" x2="125.5" y2="45" stroke="#333" stroke-width="1.8"/>
  <!-- Eighth notes (beamed) -->
  <ellipse cx="150" cy="65" rx="6" ry="4.5" fill="#333" transform="rotate(-15,150,65)"/>
  <line x1="155.5" y1="63" x2="155.5" y2="38" stroke="#333" stroke-width="1.8"/>
  <ellipse cx="170" cy="60" rx="6" ry="4.5" fill="#333" transform="rotate(-15,170,60)"/>
  <line x1="175.5" y1="58" x2="175.5" y2="35" stroke="#333" stroke-width="1.8"/>
  <!-- Beam -->
  <line x1="155.5" y1="38" x2="175.5" y2="35" stroke="#333" stroke-width="3"/>
  <!-- Quarter note -->
  <ellipse cx="195" cy="80" rx="6" ry="4.5" fill="#333" transform="rotate(-15,195,80)"/>
  <line x1="200.5" y1="78" x2="200.5" y2="50" stroke="#333" stroke-width="1.8"/>
  <!-- Small floating notes for decoration -->
  <text x="100" y="118" font-family="Georgia, serif" font-size="20" fill="#757575" opacity="0.4">&#9835;</text>
  <text x="168" y="122" font-family="Georgia, serif" font-size="16" fill="#757575" opacity="0.3">&#9834;</text>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Music</text>
</svg>