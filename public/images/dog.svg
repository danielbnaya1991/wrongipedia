<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Body -->
  <ellipse cx="140" cy="85" rx="35" ry="25" fill="#a1887f" stroke="#795548" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="108" cy="62" r="20" fill="#a1887f" stroke="#795548" stroke-width="1.5"/>
  <!-- Ears -->
  <ellipse cx="92" cy="48" rx="8" ry="14" fill="#8d6e63" stroke="#795548" stroke-width="1.5" transform="rotate(-15,92,48)"/>
  <ellipse cx="122" cy="46" rx="8" ry="14" fill="#8d6e63" stroke="#795548" stroke-width="1.5" transform="rotate(15,122,46)"/>
  <!-- Snout -->
  <ellipse cx="98" cy="68" rx="10" ry="7" fill="#bcaaa4" stroke="#795548" stroke-width="1"/>
  <!-- Nose -->
  <ellipse cx="93" cy="66" rx="4" ry="3" fill="#4e342e"/>
  <!-- Eyes -->
  <circle cx="102" cy="57" r="3" fill="#3e2723"/>
  <circle cx="116" cy="55" r="3" fill="#3e2723"/>
  <!-- Eye highlights -->
  <circle cx="103" cy="56" r="1" fill="white"/>
  <circle cx="117" cy="54" r="1" fill="white"/>
  <!-- Mouth -->
  <path d="M93,70 C96,74 100,74 103,70" fill="none" stroke="#5d4037" stroke-width="1" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M175,75 C185,65 190,55 185,45" fill="none" stroke="#a1887f" stroke-width="6" stroke-linecap="round"/>
  <path d="M175,75 C185,65 190,55 185,45" fill="none" stroke="#8d6e63" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="115" y="103" width="10" height="18" rx="4" fill="#a1887f" stroke="#795548" stroke-width="1"/>
  <rect x="130" y="103" width="10" height="18" rx="4" fill="#a1887f" stroke="#795548" stroke-width="1"/>
  <rect x="150" y="103" width="10" height="18" rx="4" fill="#a1887f" stroke="#795548" stroke-width="1"/>
  <rect x="163" y="103" width="10" height="16" rx="4" fill="#a1887f" stroke="#795548" stroke-width="1"/>
  <!-- Ground -->
  <line x1="85" y1="122" x2="200" y2="122" stroke="#bdbdbd" stroke-width="1"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Domestic Dog</text>
</svg>