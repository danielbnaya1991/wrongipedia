<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- Brontosaurus/sauropod body -->
  <ellipse cx="145" cy="85" rx="35" ry="22" fill="#8bc34a" stroke="#689f38" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M115,75 C105,65 100,45 108,35" fill="none" stroke="#689f38" stroke-width="12" stroke-linecap="round"/>
  <path d="M115,75 C105,65 100,45 108,35" fill="none" stroke="#8bc34a" stroke-width="9" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="110" cy="32" rx="10" ry="7" fill="#8bc34a" stroke="#689f38" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="114" cy="30" r="2" fill="#333"/>
  <!-- Tail -->
  <path d="M178,80 C195,75 205,70 215,60" fill="none" stroke="#689f38" stroke-width="8" stroke-linecap="round"/>
  <path d="M178,80 C195,75 205,70 215,60" fill="none" stroke="#8bc34a" stroke-width="5" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="125" y="100" width="8" height="20" rx="3" fill="#8bc34a" stroke="#689f38" stroke-width="1"/>
  <rect x="140" y="100" width="8" height="20" rx="3" fill="#8bc34a" stroke="#689f38" stroke-width="1"/>
  <rect x="155" y="100" width="8" height="20" rx="3" fill="#8bc34a" stroke="#689f38" stroke-width="1"/>
  <rect x="165" y="100" width="8" height="18" rx="3" fill="#8bc34a" stroke="#689f38" stroke-width="1"/>
  <!-- Ground -->
  <line x1="80" y1="122" x2="220" y2="122" stroke="#9e9e9e" stroke-width="1"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Dinosaurs</text>
</svg>