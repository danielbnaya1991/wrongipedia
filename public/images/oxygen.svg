<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect width="280" height="200" fill="#f8f9fa" stroke="#a2a9b1" stroke-width="1"/>
  <!-- O2 molecule - two oxygen atoms -->
  <circle cx="120" cy="72" r="24" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="160" cy="72" r="24" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2"/>
  <!-- Bond line -->
  <line x1="132" y1="64" x2="148" y2="64" stroke="#1565c0" stroke-width="2.5"/>
  <line x1="132" y1="80" x2="148" y2="80" stroke="#1565c0" stroke-width="2.5"/>
  <!-- Atom labels -->
  <text x="120" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1565c0" font-weight="bold">O</text>
  <text x="160" y="77" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1565c0" font-weight="bold">O</text>
  <!-- Air bubbles floating up -->
  <circle cx="95" cy="105" r="5" fill="none" stroke="#90caf9" stroke-width="1.2"/>
  <circle cx="185" cy="100" r="4" fill="none" stroke="#90caf9" stroke-width="1.2"/>
  <circle cx="108" cy="38" r="3" fill="none" stroke="#90caf9" stroke-width="1"/>
  <circle cx="172" cy="42" r="3.5" fill="none" stroke="#90caf9" stroke-width="1"/>
  <circle cx="82" cy="55" r="2.5" fill="none" stroke="#90caf9" stroke-width="1"/>
  <circle cx="198" cy="60" r="3" fill="none" stroke="#90caf9" stroke-width="1"/>
  <!-- Title -->
  <text x="140" y="170" text-anchor="middle" font-family="Linux Libertine, Georgia, serif" font-size="13" fill="#202122">Oxygen</text>
</svg>